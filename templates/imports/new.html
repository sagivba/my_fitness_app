<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>העלאת קובץ ייבוא</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="container">
    <h1>העלאת קובץ ייבוא</h1>
    <p><a href="/imports/">חזרה לייבוא קבצים</a></p>

    <form method="post" action="/imports/" enctype="multipart/form-data">
      <p>
        <label for="file">קובץ פעילות</label><br>
        <input
          id="file"
          name="file"
          type="file"
          accept=".csv,.tcx,.gpx,.fit"
          required
        >
        {% if errors.get("file") %}
          <span class="error">{{ errors["file"] }}</span>
        {% endif %}
      </p>

      <button type="submit">העלאה</button>
    </form>
  </main>
</body>
</html>
